name: release
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }
      - run: pip install pyyaml

      - name: Validate
        run: python3 scripts/validate.py

      - name: Render with release tag
        run: python3 scripts/render.py --tag "${GITHUB_REF#refs/tags/}"

      - name: Inspect dist
        run: |
          set -euo pipefail
          ls -la dist/
          cat dist/manifest.json

      - name: Compute release notes
        id: notes
        run: |
          set -euo pipefail
          {
            echo "Auto-generated by render.py at $(date -u +%FT%TZ)."
            echo
            echo "## Tier summaries"
            echo
            python3 scripts/release_notes.py
            echo
            echo "## Verification"
            echo
            echo 'Backend caches each release under `/var/lib/centervpn/blocklists/<tag>/` and validates sha256 against `manifest.json` before atomically updating `current`. Gateways pull on a 15 min timer over wg_mgmt and report status to the admin UI.'
          } > /tmp/notes.md
          echo "path=/tmp/notes.md" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body_path: ${{ steps.notes.outputs.path }}
          files: |
            dist/manifest.json
            dist/*.conf
