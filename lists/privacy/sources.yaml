# Privacy/telemetry-focused sources (DNS3-only).
#
# These are intentionally separated from tracker baseline so DNS2 stays
# lower-breakage, while DNS3 gets stronger privacy posture.
sources:
  - name: hagezi-tracker-amazon
    url: https://cdn.jsdelivr.net/gh/hagezi/dns-blocklists@latest/domains/native.amazon.txt
    format: domains
    license: "Hagezi list license"
    description: Amazon telemetry/native tracking domains.

