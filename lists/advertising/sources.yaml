# Advertising blocklist sources.
#
# Each entry must declare:
#   - name:         human-readable identifier (used in release notes)
#   - url:          fetch URL (HTTPS only; CI fails the build otherwise)
#   - format:       one of {hosts, domains, abp}
#                     hosts   = /etc/hosts style ("0.0.0.0 example.com")
#                     domains = one domain per line
#                     abp     = AdBlock Plus filter syntax (only the ||...^ rules are extracted)
#   - license:      SPDX identifier or short name (for attribution)
#   - description:  one-liner, shown in release notes
#
# IMPORTANT: do not hot-link to a moving HEAD; reference a tagged or
# pinned URL when the source supports it. CI flags any URL containing
# `master` or `main` as a non-fatal warning so we can review.

sources:
  - name: stevenblack-unified
    url: https://raw.githubusercontent.com/StevenBlack/hosts/master/hosts
    format: hosts
    license: MIT
    description: StevenBlack unified hosts (ads + malware base set).

  - name: adguard-dns-filter
    url: https://adguardteam.github.io/AdGuardSDNSFilter/Filters/filter.txt
    format: abp
    license: GPLv3
    description: AdGuard public DNS filter (ad servers + tracking).

  - name: peter-lowe-adservers
    url: https://pgl.yoyo.org/adservers/serverlist.php?hostformat=hosts&showintro=0
    format: hosts
    license: "Free (non-commercial)"
    description: Peter Lowe's ad-and-tracking server list.
